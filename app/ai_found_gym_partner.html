<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gym Partners in {{ city }}</title>
  <style>
    .friend-card {
      background-color: #f4f4f4;
      padding: 20px;
      margin: 10px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .friend-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .friend-card p {
      font-size: 18px;
      margin: 5px 0;
    }
    .friends-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>Gym Partners in {{ city }}</h1>
  <div class="friends-container">
    {% for user in friends %}
      <div class="friend-card">
        <img src="{{ user.img }}" alt="Profile Picture">
        <p><strong>Name:</strong> {{ user.name }}</p>
        <p><strong>Gender:</strong> {{ user.gender }}</p>
        <p><strong>Age:</strong> {{ user.age }}</p>
        <p><strong>City:</strong> {{ user.city }}</p>
      </div>
    {% endfor %}
  </div>
</body>
</html>
