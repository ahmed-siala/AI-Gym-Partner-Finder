<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Found Gym Partner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ai_found_gym_partner.css') }}">
  <style>
    body {
  font-family: Arial, sans-serif;
  background-color: #ffffff;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 32px;
  margin-bottom: 30px;
  color: #333;
}

.friends-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.friend-card {
  background-color: #f4f4f4;
  padding: 20px;
  margin: 10px;
  border-radius: 8px;
  width: 300px;
  text-align: center;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  transition: transform 0.2s;
}

.friend-card:hover {
  transform: scale(1.02);
}

.friend-card img {
  width: 100%;
  height: auto;
  border-radius: 8px;
}

.friend-card p {
  font-size: 18px;
  margin: 5px 0;
  color: #333;
}

button.invite,
button.remove {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.3s;
}

button.invite {
  background-color: #4CAF50;
  color: white;
}

button.invite:hover {
  background-color: #45a049;
}

button.remove {
  background-color: #f44336;
  color: white;
}

button.remove:hover {
  background-color: #e53935;
}
  </style>
</head>
<body>
  <h1>AI Found Your Closest Gym Partner in {{ city }}</h1>

  <div class="friends-container" id="friends-container">
    {% for friend in friends %}
      <div class="friend-card">
        <img src="{{ url_for('static', filename='images/' + friend['img']) }}" alt="Profile Picture">
        <p><strong>Name:</strong> {{ friend['name'] }}</p>
        <p><strong>Gender:</strong> {{ friend['gender'] }}</p>
        <p><strong>Age:</strong> {{ friend['age'] }}</p>
        <p><strong>Country:</strong> {{ friend['country'] }}</p>
        <p><strong>City:</strong> {{ friend['city'] }}</p>
        <button class="invite">Invite</button>
        <button class="remove">Remove</button>
      </div>
    {% endfor %}
  </div>

  <script>
    function attachButtonHandlers() {
      document.querySelectorAll('.invite').forEach(button => {
        button.addEventListener('click', () => {
          button.textContent = 'Invite Sent ✅';
          button.disabled = true;
          button.style.backgroundColor = 'gray';
        });
      });

      document.querySelectorAll('.remove').forEach(button => {
        button.addEventListener('click', () => {
          const card = button.closest('.friend-card');
          if (card) {
            card.remove();
          }
        });
      });
    }

    attachButtonHandlers();
  </script>
</body>
</html>
